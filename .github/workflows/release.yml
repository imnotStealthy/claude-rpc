name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@1.86.0

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis --version=3.11 -y --no-progress

      - run: npm ci

      - run: node --check tauri-ui/main.js

      - run: npm test

      - run: npm run build

      - name: Verify release artifacts
        shell: pwsh
        run: |
          $setup = Get-ChildItem "src-tauri\target\release\bundle\nsis" -Filter "Claude RPC_*_x64-setup.exe" | Select-Object -First 1
          if (!(Test-Path "bin\claude-rpc.exe")) { throw "Missing bin\claude-rpc.exe" }
          if (!$setup) { throw "Missing NSIS installer" }
          Get-FileHash "bin\claude-rpc.exe", $setup.FullName -Algorithm SHA256

      - name: Upload artifacts for release job
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            bin/claude-rpc.exe
            src-tauri/target/release/bundle/nsis/Claude RPC_*_x64-setup.exe

  publish-release:
    runs-on: ubuntu-latest
    needs: build-windows
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: release-artifacts

      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            release-artifacts/bin/claude-rpc.exe \
            release-artifacts/src-tauri/target/release/bundle/nsis/Claude\ RPC_*_x64-setup.exe \
            --generate-notes
